on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: check

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo check
      - run: cargo clippy -- -D warnings
