on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: release

# Minimal default — only read access unless a job overrides.
permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check

  release-please:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: rust
          manifest-file: Cargo.toml
          config-file: .release-please-config.json
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write  # required by Cosign OIDC signing only
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1  # pin — update when upgrading

      - name: Sign binary with Sigstore
        shell: pwsh
        run: |
          cosign sign-blob `
            target/release/ps-battery.exe `
            --yes `
            --bundle target/release/ps-battery.exe.bundle

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            target/release/ps-battery.exe
            target/release/ps-battery.exe.bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
